# 本模板使用相对节点 key，launch 会在运行时按 namespace 编排。
# 自定义 controllers_file 也支持 '/**'、'/**/<node>' 与 '/<namespace>/<node>' 写法。
#
# 1. 管理器配置
controller_manager:
  ros__parameters:
    update_rate: 125
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    estun_state_broadcaster:
      type: estun_controllers/EstunStateBroadcaster
    estun_do_controller:
      type: estun_controllers/EstunDOController
    estun_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    forward_position_controller:
      type: forward_command_controller/ForwardCommandController
    cartesian_forward_controller:
      type: forward_command_controller/MultiInterfaceForwardCommandController

# 2. 广播器配置
joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

estun_state_broadcaster:
  ros__parameters:
    prefix: ""
    state_publish_rate: 10.0

estun_do_controller:
  ros__parameters:
    prefix: ""
    sdk_namespace: "/estun"
    service_timeout_ms: 3000

# 3. 核心控制器配置
estun_arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# 关节实时流控制（servoToAPOS）
forward_position_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    interface_name: position

# 笛卡尔实时流控制（servoToCPOS）
cartesian_forward_controller:
  ros__parameters:
    # 与 ros2_control 中的 <gpio name="cartesian_tcp"> 对应
    # 注意：通过 estun_control/demo launch 启动时，会按 prefix 自动改写该字段。
    # 仅在绕过 launch 直接使用此 yaml 时，才需要手工写成 "<prefix>cartesian_tcp"。
    joint: cartesian_tcp
    interface_names:
      - "x"
      - "y"
      - "z"
      - "a"
      - "b"
      - "c"
